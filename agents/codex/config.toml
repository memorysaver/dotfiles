## Codex CLI configuration
# Customize Codex CLI behavior via this config file.
# See https://github.com/openai/codex/blob/main/codex-rs/config.md for options.

# The default model (override as needed):
# model = "gpt-4.1"
model_provider = "openai"
model = "gpt-5.5"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"

# Keep local Codex sessions useful for development automation while preserving
# workspace-write filesystem boundaries. Do not copy Codex.app internal state
# keys such as `codexCloudAccess` or `agent_network_access` into this TOML.
[sandbox_workspace_write]
network_access = true
writable_roots = [
  "/Users/memorysaver/Library/Mobile Documents/iCloud~md~obsidian/Documents/Obsidian iCloud Vault",
  "/Users/memorysaver/.cache/podwise",
]

[model_providers.groq]
name = "groq"
base_url = "https://api.groq.com/openai/v1"
env_key = "GROQ_API_KEY"
approval_policy = "never"

[model_providers.openrouter]
name = "openrouter"
base_url="https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"
approval_policy = "never"

[profiles.k2]
model_provider = "openrouter"
model = "moonshotai/kimi-k2"

# MCP (Model Context Protocol) servers
[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]

[plugins."github@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[projects."/Users/memorysaver/.dotfiles"]
trust_level = "trusted"

[projects."/Users/memorysaver/Documents/newsroom"]
trust_level = "trusted"

[notice.model_migrations]
gpt-5-codex = "gpt-5.5"

[marketplaces.openai-bundled]
last_updated = "2026-04-24T02:02:01Z"
source_type = "local"
source = "/Users/memorysaver/.codex/.tmp/bundled-marketplaces/openai-bundled"

